<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Превью виджета</title>
  <style>
    html, body { margin: 0; height: 100%; background: #f6f7f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .ph { padding: 14px 16px; color: #9aa3b2; font-size: 12px; }
    .stage { padding: 8px 20px 40px; }
    .miss { color: #b91c1c; padding: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="ph">Живое превью · события аналитики здесь не засчитываются</div>
  <div class="stage"><div id="host"></div></div>
  <script>
    // Не засчитывать показы/клики из превью.
    window.__WIDGET_NO_TRACK = true;
    var id = new URLSearchParams(location.search).get("id");
    if (id) {
      document.getElementById("host").setAttribute("data-widget-id", id);
      var s = document.createElement("script");
      s.src = "/embed.js?_=" + Date.now();
      s.async = true;
      document.body.appendChild(s);
    } else {
      document.getElementById("host").outerHTML = '<div class="miss">Не указан id виджета</div>';
    }
  </script>
</body>
</html>
